name: codex-implement

on:
  workflow_dispatch:
    inputs:
      task_file:
        description: "Task file in .codex/tasks/"
        required: true
        type: string

jobs:
  codex:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Codex
        uses: openai/codex-action@v1
        with:
          prompt: |
            Read AGENTS.md first.
            Read .codex/mission.md, .codex/rules.md, .codex/acceptance.md, and the task file specified by workflow input.
            Read canon before touching code.
            Do not modify canonical docs.
            Implement only the assigned task.
            Run repository PowerShell scripts.
            Use .codex/report-template.md exactly.
            Do not claim PASS unless required checks pass.
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}