name: codex-review

on:
  pull_request:

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Codex review
        uses: openai/codex-action@v1
        with:
          prompt: |
            Review this pull request as a hostile architectural auditor.
            Read AGENTS.md first.
            Check package boundaries, canon compliance, missing tests, fake completion claims, and unjustified dependencies.
            Report concrete risks with exact file paths.
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}